# 这个文件需要放到 tea4two-bot/tea4two-discuss 仓库的 .github/workflows/ 目录下
# 不是主 repo，因为 Giscus 的 discussion_comment 事件在 tea4two-discuss 里触发

name: 顺顺回复 @mention

on:
  discussion_comment:
    types: [created]

permissions:
  discussions: write

jobs:
  reply:
    runs-on: ubuntu-latest
    # 含关键词 且 不是顺顺自己发的（防止循环）
    if: |
      (contains(github.event.comment.body, '@shunshun') ||
       contains(github.event.comment.body, '顺顺')) &&
      github.event.comment.user.login != 'shunshun-t42'

    steps:
      - name: 拉取主 repo（获取记忆和脚本）
        uses: actions/checkout@v4
        with:
          repository: chunyang-w/tea4two
          token: ${{ secrets.MAIN_REPO_TOKEN }}

      - name: 生成回复
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          export COMMENT_BODY="${{ github.event.comment.body }}"
          export COMMENTER="${{ github.event.comment.user.login }}"
          export MEMORY=$(cat src/pet/data/memory.md)

          python3 src/pet/scripts/build_mention_reply_request.py > /tmp/reply_request.json

          curl -sf https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @/tmp/reply_request.json \
            | python3 src/pet/scripts/parse_response.py > /tmp/reply.txt

          echo "=== 顺顺的回复 ==="
          cat /tmp/reply.txt

      - name: 在原评论下回复
        env:
          GH_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: |
          REPLY=$(cat /tmp/reply.txt)
          DISCUSSION_ID="${{ github.event.discussion.node_id }}"
          COMMENT_ID="${{ github.event.comment.node_id }}"

          # GitHub Discussions 只支持一层嵌套：replyToId 必须是顶层评论。
          # 如果触发的评论本身已经是 reply，就用它的 parent id，否则直接用它自己。
          PARENT_ID=$(gh api graphql \
            -f query='query($id: ID!) { node(id: $id) { ... on DiscussionComment { replyTo { id } } } }' \
            -f id="$COMMENT_ID" \
            --jq '.data.node.replyTo.id // empty' 2>&1 || true)

          echo "COMMENT_ID=$COMMENT_ID PARENT_ID=${PARENT_ID:-<empty>}"
          REPLY_TO_ID="${PARENT_ID:-$COMMENT_ID}"
          echo "REPLY_TO_ID=$REPLY_TO_ID"

          gh api graphql -f query='
            mutation($discussionId: ID!, $replyToId: ID!, $body: String!) {
              addDiscussionComment(input: {
                discussionId: $discussionId,
                replyToId: $replyToId,
                body: $body
              }) {
                comment { id url }
              }
            }
          ' -f discussionId="$DISCUSSION_ID" \
            -f replyToId="$REPLY_TO_ID" \
            -f body="$REPLY"
